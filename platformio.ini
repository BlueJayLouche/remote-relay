; AromaDiffuser — sACN (E1.31) -> aroma-diffuser pump trigger for theatre cues.
; Target: ESP32-C3 Super Mini (WiFi only). One sACN channel -> one relay output.
;
; Build & flash:   pio run -e c3 -t upload
; Serial monitor:  pio device monitor

[env:c3]
; arduino-esp32 v3 (IDF 5.x) via the pioarduino fork. The stock espressif32 6.x
; platform = arduino-esp32 v2.x (IDF 4.4), whose ESP32-C3 softAP driver has flaky
; WPA2 association with macOS/iOS clients — the config portal was unjoinable on v2.
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board     = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200

; Several libs (WiFiManager + sACN + OSC + async web server) -> use the big app
; partition. We don't do OTA, so trading the OTA slot for app space is free.
board_build.partitions = huge_app.csv

; ESP32-C3 Super Mini flashes over its native USB-C port. If it will not auto-
; enter the bootloader: hold BOOT (GPIO9), tap RST, release BOOT, then upload.
upload_speed = 460800

; Route Serial to the native USB-CDC so the monitor works over the single USB-C.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    tzapu/WiFiManager @ ^2.0.17   ; captive-portal config page (WiFi + universe/channel)
    https://github.com/CNMAT/OSC.git                     ; OSC over UDP (optional protocol)
    https://github.com/ESP32Async/ESPAsyncWebServer.git  ; always-on status page
    https://github.com/ESP32Async/AsyncTCP.git
